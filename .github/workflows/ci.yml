name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint skills
        run: npm run lint:skills

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Build dist
        run: npm run build

      - name: Smoke test
        run: npm run smoke
