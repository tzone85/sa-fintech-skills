version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Johannesburg
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore
      include: scope
    groups:
      dev-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Johannesburg
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
      - security
    commit-message:
      prefix: ci
      include: scope
